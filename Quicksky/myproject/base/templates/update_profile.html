{% extends "main.html" %}
{% block content %}

<div class="profile-container">
<h2>Update Profile</h2>

<form method="POST">
{% csrf_token %}
<input type="text" name="first_name" value="{{request.user.first_name}}" placeholder="First Name">
<input type="text" name="last_name" value="{{request.user.last_name}}" placeholder="Last Name">
<input type="email" name="email" value="{{request.user.email}}" placeholder="Email">
<button class="profile-btn">Save</button>
</form>

</div>
{% endblock %}
